<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Scores - Ship Briefing</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .scores-container { max-width: 1000px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .page-title { color: #004080; text-align: center; margin-bottom: 30px; font-size: 2rem; }
        
        /* 篩選器區塊 */
        .filter-section { display: flex; gap: 15px; margin-bottom: 30px; background: #f8fafc; padding: 20px; border-radius: 8px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 200px; }
        .filter-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #334155; font-size: 0.9rem; }
        .filter-group input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .filter-btn { background: #3b82f6; color: white; border: none; padding: 10px 24px; font-size: 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; height: 40px; transition: 0.2s; }
        .filter-btn:hover { background: #2563eb; }

        /* 表格樣式 */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; color: #475569; font-weight: bold; white-space: nowrap; }
        tr:hover { background-color: #f8fafc; }
        
        .score-good { color: #15803d; font-weight: bold; }
        .score-bad { color: #dc2626; font-weight: bold; }
        
        #loading { text-align: center; padding: 40px; color: #64748b; font-size: 1.1rem; }
        .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(59,130,246,0.3); border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s ease-in-out infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        nav { position: sticky !important; top: 0 !important; z-index: 1000 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Harassment</a></li>
            <li><a href="stevedore.html">Stevedore</a></li>
            <li><a href="quiz.html" class="quiz-btn">Quiz</a></li>
            <li><a href="scores.html" style="font-weight:bold; border-bottom: 2px solid white;">Scores</a></li>
        </ul>
    </nav>
    
    <main>
        <div class="scores-container">
            <h1 class="page-title">Assessment Records</h1>
            
            <div class="filter-section">
                <div class="filter-group">
                    <label>Filter by Vessel</label>
                    <input type="text" id="vessel-filter" placeholder="e.g. MV Wisdom">
                </div>
                <div class="filter-group">
                    <label>Filter by Course</label>
                    <input type="text" id="course-filter" placeholder="e.g. Harassment">
                </div>
                <button class="filter-btn" onclick="fetchScores()">Apply Filter</button>
            </div>

            <div id="loading">
                <div class="spinner"></div><br>
                Fetching records...
            </div>

            <div class="table-wrapper">
                <table id="scores-table" class="hidden">
                    <thead>
                        <tr>
                            <th>Date (GMT+0)</th>
                            <th>Vessel</th>
                            <th>Name</th>
                            <th>Rank</th>
                            <th>Course</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
            
            <div id="no-data" class="hidden" style="text-align: center; padding: 40px; color: #94a3b8;">
                No matching records found.
            </div>
        </div>
    </main>

    <script>
        // ⭐ 將這裡替換成您部署 GAS 後取得的 Web App URL ⭐
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz8WbXiYWBihL9L_gqElxeHRVEUbt3jaDm0k-Xjwvf00pKn_ZWTSjAeMg3Bn6UAlT_dvQ/exec"; 

        // 頁面載入時自動取得最新的 25 筆
        window.onload = () => {
            fetchScores(true);
        };

        async function fetchScores(isInitialLoad = false) {
            const table = document.getElementById('scores-table');
            const tbody = document.getElementById('table-body');
            const loading = document.getElementById('loading');
            const noData = document.getElementById('no-data');
            
            const vesselFilter = document.getElementById('vessel-filter').value.trim();
            const courseFilter = document.getElementById('course-filter').value.trim();

            // 準備 Request 資料
            const payload = {
                action: "getScores",
                filterVessel: vesselFilter,
                filterCourse: courseFilter,
                limit: isInitialLoad ? 25 : 9999 // 首次載入只抓 25 筆，若有套用條件則抓所有符合的(兩年內)
            };

            // 切換 UI 狀態
            table.classList.add('hidden');
            noData.classList.add('hidden');
            loading.classList.remove('hidden');
            tbody.innerHTML = '';

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    const data = result.data;
                    
                    if (data.length === 0) {
                        noData.classList.remove('hidden');
                    } else {
                        // 填入表格
                        data.forEach(row => {
                            const scoreClass = parseInt(row.score) >= 80 ? 'score-good' : 'score-bad';
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td>${row.date}</td>
                                <td>${row.vessel}</td>
                                <td>${row.name}</td>
                                <td>${row.rank}</td>
                                <td>${row.course}</td>
                                <td class="${scoreClass}">${row.score}%</td>
                            `;
                            tbody.appendChild(tr);
                        });
                        table.classList.remove('hidden');
                    }
                } else {
                    alert("Error fetching data: " + result.message);
                }
            } catch (error) {
                console.error("Fetch error:", error);
                alert("Network error while fetching scores.");
            } finally {
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
